<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주식회사 이투 - 에디터</title>
    <link href="https://unpkg.com/@blueprintjs/core@5.10.2/lib/css/blueprint.css" rel="stylesheet" />
    <link href="https://unpkg.com/@blueprintjs/icons@5.10.2/lib/css/blueprint-icons.css" rel="stylesheet" />
    <style>
      /* 1. 기본 여백 제거 및 전체화면 고정 */
      body, html, #root { 
        margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
      }
      
      /* 2. 빨간 딱지(라이선스 경고) 강제 은폐 */
      div[style*="background: red"], 
      div[style*="background-color: red"],
      .bp5-callout.bp5-intent-danger {
        display: none !important;
      }
      
      /* 3. 에디터 내부 레이아웃 정렬 */
      .polotno-container {
        width: 100vw !important;
        height: 100vh !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
