<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주식회사 이투 시안 에디터</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
    #root { width: 100vw; height: 100vh; display: none; }
    #status { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Malgun Gothic', sans-serif; background: #ffffff; z-index: 100;
    }
    .loader { border: 5px solid #f3f3f3; border-top: 5px solid #2563eb; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="status">
    <div class="loader"></div>
    <div id="msg">안전한 경로로 엔진을 다시 불러오는 중...</div>
  </div>
  <div id="root"></div>

  <script type="module">
    const msg = document.getElementById('msg');
    
    async function launch() {
      // 1순위 경로: esm.sh (가장 빠름)
      // 2순위 경로: skypack (백업용)
      const paths = [
        'https://esm.sh/polotno',
        'https://cdn.skypack.dev/polotno'
      ];

      for (const path of paths) {
        try {
          msg.innerText = "엔진 접속 시도 중... (" + (paths.indexOf(path) + 1) + "/2)";
          const { createInstance } = await import(path);
          
          const { store } = createInstance({
            container: document.getElementById('root'),
            key: '', 
          });

          // 데이터 로드
          store.loadJSON({
            width: 6000, height: 900,
            pages: [{ id: "p1", elements: [
              {type:"text", x:3000, y:450, width:5000, text:"이곳을 클릭해 시안을 수정하세요", fontSize:200, align:"center", fill:"#000"}
            ]}]
          });

          // 성공 시 화면 전환
          document.getElementById('status').style.display = 'none';
          document.getElementById('root').style.display = 'block';

          // 버튼 생성
          setInterval(() => {
            const header = document.querySelector('.polotno-header-right') || document.querySelector('[class*="header-right"]');
            if (header && !document.getElementById('etoo-btn')) {
              const btn = document.createElement('button');
              btn.id = 'etoo-btn';
              btn.innerText = '시안확정 (발주하기)';
              btn.style = 'background:#2563eb; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; font-weight:bold; margin-left:10px;';
              btn.onclick = () => { window.top.location.href = "https://tally.so/r/xXNz09?project_id=ETOO_" + Date.now(); };
              header.appendChild(btn);
            }
          }, 500);
          
          return; // 성공하면 반복문 종료

        } catch (err) {
          console.error("경로 실패: " + path, err);
        }
      }
      
      msg.innerHTML = "<b style='color:red;'>모든 경로가 차단되었습니다.</b><br>네트워크 환경이나 브라우저 설정을 확인해주세요.";
    }

    launch();
  </script>
</body>
</html>
