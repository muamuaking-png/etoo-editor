<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주식회사 이투 에디터</title>
  <style>
    body, html, #root { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createInstance } from 'https://unpkg.com/polotno@latest/dist/index.js';

    const { store } = createInstance({
      container: document.getElementById('root'),
      key: '', // 무료 버전
    });

    // 현수막 6000x900 사이즈 및 템플릿 로드
    store.loadJSON({
      width: 6000,
      height: 900,
      pages: [{
        id: "p1",
        elements: [
          {type:"text", x:3000, y:400, width:5000, text:"2026년 마케팅그룹 워크샵", fontSize:250, align:"center", fill:"#00c4a6"},
          {type:"text", x:3000, y:650, width:5000, text:"2026. 04. 21   테스트홍보팀", fontSize:150, align:"center", fill:"#000000"}
        ]
      }]
    });

    // 상단바에 시안확정 버튼 생성
    setInterval(() => {
      const header = document.querySelector('.polotno-header-right') || document.querySelector('[class*="header-right"]');
      if (header && !document.getElementById('etoo-btn')) {
        const btn = document.createElement('button');
        btn.id = 'etoo-btn';
        btn.innerText = '시안확정 (발주서 이동)';
        btn.style = 'background:#2563eb; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; margin-left:10px;';
        btn.onclick = () => {
          // Softr 전체 창을 탈리(Tally)로 이동
          window.top.location.href = "https://tally.so/r/xXNz09?project_id=ETOO_" + Date.now();
        };
        header.appendChild(btn);
      }
    }, 500);
  </script>
</body>
</html>
