<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주식회사 이투 에디터</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: white; }
    #root { width: 100vw; height: 100vh; }
    #loading { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      display: flex; align-items: center; justify-content: center; 
      font-family: sans-serif; background: #fff; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="loading">잠시만 기다려주세요...</div>
  <div id="root"></div>

  <script type="module">
    // 1. 가장 안정적인 라이브러리 주소로 교체
    import { createInstance } from 'https://cdn.skypack.dev/polotno';

    async function init() {
      try {
        const container = document.getElementById('root');
        
        // 2. 에디터 생성
        const { store } = createInstance({
          container: container,
          key: '', // 무료 버전
        });

        // 3. 디자인 데이터 주입 (최대한 가볍게 구성)
        store.loadJSON({
          width: 6000,
          height: 900,
          pages: [{
            id: "p1",
            elements: [
              {type:"text", x:3000, y:400, width:5000, text:"2026년 마케팅그룹 워크샵", fontSize:250, align:"center", fill:"#00c4a6"},
              {type:"text", x:3000, y:650, width:5000, text:"내용을 입력하세요", fontSize:150, align:"center", fill:"#000000"}
            ]
          }]
        });

        // 로딩 메시지 삭제
        document.getElementById('loading').style.display = 'none';

        // 4. 시안확정 버튼 (반복 체크로 확실히 생성)
        const checkHeader = setInterval(() => {
          const header = document.querySelector('.polotno-header-right') || document.querySelector('[class*="header-right"]');
          if (header) {
            clearInterval(checkHeader);
            if (!document.getElementById('etoo-btn')) {
              const btn = document.createElement('button');
              btn.id = 'etoo-btn';
              btn.innerText = '시안확정 (발주하기)';
              btn.style = 'background:#2563eb; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; font-weight:bold; margin-left:10px;';
              btn.onclick = () => {
                window.top.location.href = "https://tally.so/r/xXNz09?project_id=ETOO_" + Date.now();
              };
              header.appendChild(btn);
            }
          }
        }, 500);

      } catch (err) {
        document.getElementById('loading').innerHTML = "화면을 불러오지 못했습니다. <br>에러내용: " + err.message;
      }
    }

    init();
  </script>
</body>
</html>
