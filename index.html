<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주식회사 이투 시안 에디터</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f8f9fa; }
    #root { width: 100vw; height: 100vh; display: none; }
    #status { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: sans-serif; background: #ffffff; z-index: 100;
    }
    .loader { border: 5px solid #f3f3f3; border-top: 5px solid #2563eb; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="status">
    <div class="loader"></div>
    <div id="msg">에디터 엔진 시동 중...</div>
  </div>
  <div id="root"></div>

  <script type="module">
    // 1. 가장 빠른 전송 경로(esm.sh)로 변경
    import { createInstance } from 'https://esm.sh/polotno@1.3.16';

    async function init() {
      const root = document.getElementById('root');
      const status = document.getElementById('status');

      try {
        const { store } = createInstance({
          container: root,
          key: '', // 무료 버전
        });

        // 2. 이투 현수막 기본 데이터 주입
        store.loadJSON({
          width: 6000, height: 900,
          pages: [{ id: "p1", elements: [
            {type:"text", x:3000, y:450, width:5000, text:"이곳을 클릭해 내용을 수정하세요", fontSize:200, align:"center", fill:"#000"}
          ]}]
        });

        // 3. 로딩 완료 시 화면 전환
        status.style.display = 'none';
        root.style.display = 'block';

        // 4. 발주 버튼 생성 (상단바 우측)
        setInterval(() => {
          const header = document.querySelector('.polotno-header-right') || document.querySelector('[class*="header-right"]');
          if (header && !document.getElementById('etoo-btn')) {
            const btn = document.createElement('button');
            btn.id = 'etoo-btn';
            btn.innerText = '시안확정 (발주하기)';
            btn.style = 'background:#2563eb; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; font-weight:bold; margin-left:10px;';
            btn.onclick = () => { window.top.location.href = "https://tally.so/r/xXNz09?project_id=ETOO_" + Date.now(); };
            header.appendChild(btn);
          }
        }, 500);

      } catch (err) {
        document.getElementById('msg').innerHTML = "<b style='color:red;'>로드 실패</b><br>" + err.message;
      }
    }
    init();
  </script>
</body>
</html>
