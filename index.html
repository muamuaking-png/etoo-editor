<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주식회사 이투 시안 에디터</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; }
    #root { width: 100vw; height: 100vh; display: none; }
    #status { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: sans-serif; background: #ffffff; z-index: 100;
    }
  </style>
</head>
<body>
  <div id="status">
    <div id="msg">엔진을 안전하게 불러오는 중...</div>
    <div id="debug" style="margin-top:20px; color:gray; font-size:12px;"></div>
  </div>
  <div id="root"></div>

  <script type="module">
    // 전 세계에서 가장 신뢰받는 jsDelivr 서버를 사용합니다.
    import { createInstance } from 'https://cdn.jsdelivr.net/npm/polotno/+esm';

    async function init() {
      const msg = document.getElementById('msg');
      const debug = document.getElementById('debug');

      try {
        const { store } = createInstance({
          container: document.getElementById('root'),
          key: '', 
        });

        // 디자인 데이터 주입
        store.loadJSON({
          width: 6000, height: 900,
          pages: [{ id: "p1", elements: [
            {type:"text", x:3000, y:450, width:5000, text:"이곳을 클릭해 시안을 수정하세요", fontSize:200, align:"center", fill:"#000"}
          ]}]
        });

        // 성공 시 화면 전환
        document.getElementById('status').style.display = 'none';
        document.getElementById('root').style.display = 'block';

        // 발주 버튼 생성
        setInterval(() => {
          const header = document.querySelector('.polotno-header-right') || document.querySelector('[class*="header-right"]');
          if (header && !document.getElementById('etoo-btn')) {
            const btn = document.createElement('button');
            btn.id = 'etoo-btn';
            btn.innerText = '시안확정 (발주하기)';
            btn.style = 'background:#2563eb; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; font-weight:bold; margin-left:10px;';
            btn.onclick = () => { window.top.location.href = "https://tally.so/r/xXNz09?project_id=ETOO_" + Date.now(); };
            header.appendChild(btn);
          }
        }, 500);

      } catch (err) {
        msg.innerHTML = "<b style='color:red;'>엔진 로드 실패</b>";
        debug.innerText = "원인: " + err.message;
      }
    }
    init();
  </script>
</body>
</html>
