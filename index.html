<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주식회사 이투 - 무제한 시안 에디터</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; }
        #root { width: 100vw; height: 100vh; display: none; }
        #status-box { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Malgun Gothic', sans-serif; background: #ffffff; z-index: 1000;
        }
        .loading-icon { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #log { font-size: 12px; color: #888; margin-top: 15px; max-width: 80%; text-align: center; }
    </style>
</head>
<body>
    <div id="status-box">
        <div class="loading-icon"></div>
        <div id="msg">이투 에디터 엔진을 강제 기동하는 중...</div>
        <div id="log">네트워크 보안 검사를 우회하고 있습니다.</div>
    </div>
    <div id="root"></div>

    <script type="module">
        const msg = document.getElementById('msg');
        const log = document.getElementById('log');

        async function start() {
            try {
                log.innerText = "단계 1: 보안 통로 확보 중...";
                
                // ?bundle 파라미터를 추가하여 브라우저의 검역을 피합니다.
                const { createInstance } = await import('https://esm.sh/polotno@1.3.16?bundle');
                
                log.innerText = "단계 2: 보따리 해제 및 시동 중...";
                
                const { store } = createInstance({
                    container: document.getElementById('root'),
                    key: '', // 무료 버전
                });

                log.innerText = "단계 3: 현수막 시안 그리는 중...";
                
                store.loadJSON({
                    width: 6000, height: 900,
                    pages: [{ id: "p1", elements: [
                        {type:"text", x:3000, y:450, width:5000, text:"이곳을 클릭해 시안을 수정하세요", fontSize:200, align:"center", fill:"#000"}
                    ]}]
                });

                // 성공 시 화면 전환
                document.getElementById('status-box').style.display = 'none';
                document.getElementById('root').style.display = 'block';

                // 발주 버튼 생성
                setInterval(() => {
                    const header = document.querySelector('.polotno-header-right') || document.querySelector('[class*="header-right"]');
                    if (header && !document.getElementById('etoo-btn')) {
                        const btn = document.createElement('button');
                        btn.id = 'etoo-btn'; btn.innerText = '시안확정 (발주하기)';
                        btn.style = 'background:#2563eb; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; font-weight:bold; margin-left:10px;';
                        btn.onclick = () => { window.top.location.href = "https://tally.so/r/xXNz09?project_id=ETOO_" + Date.now(); };
                        header.appendChild(btn);
                    }
                }, 500);

            } catch (err) {
                msg.innerHTML = "<b style='color:red;'>보안 벽에 막혔습니다.</b>";
                log.innerHTML = "해결책: <b>'시크릿 모드'</b>로 접속하거나 <b>'광고 차단기'</b>를 꺼주세요.<br>(에러: " + err.message + ")";
            }
        }
        start();
    </script>
</body>
</html>
