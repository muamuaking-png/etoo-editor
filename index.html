<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주식회사 이투 시안 에디터</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
    #root { width: 100vw; height: 100vh; display: none; }
    #status { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; text-align: center; }
  </style>
</head>
<body>
  <div id="status">
    <div id="loader">시안 에디터를 불러오는 중입니다... (약 10초 소요)</div>
    <div id="error-msg" style="color: red; margin-top: 10px;"></div>
  </div>
  <div id="root"></div>

  <script type="module">
    // 가장 빠른 경로로 엔진 호출
    import { createInstance } from 'https://unpkg.com/polotno@latest/dist/index.js';

    async function init() {
      const root = document.getElementById('root');
      const status = document.getElementById('status');
      const errorMsg = document.getElementById('error-msg');

      try {
        const { store } = createInstance({
          container: root,
          key: '', // 무료 버전
        });

        // 디자인 데이터 주입 (최소화)
        store.loadJSON({
          width: 6000, height: 900,
          pages: [{ id: "p1", elements: [
            {type:"text", x:3000, y:450, width:5000, text:"내용을 입력하세요", fontSize:200, align:"center", fill:"#000"}
          ]}]
        });

        // 로딩창 끄고 에디터 켜기
        status.style.display = 'none';
        root.style.display = 'block';

        // 발주 버튼 생성
        setInterval(() => {
          const header = document.querySelector('.polotno-header-right') || document.querySelector('[class*="header-right"]');
          if (header && !document.getElementById('etoo-btn')) {
            const btn = document.createElement('button');
            btn.id = 'etoo-btn';
            btn.innerText = '시안확정 (발주하기)';
            btn.style = 'background:#2563eb; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; font-weight:bold; margin-left:10px;';
            btn.onclick = () => { window.top.location.href = "https://tally.so/r/xXNz09?project_id=ETOO_" + Date.now(); };
            header.appendChild(btn);
          }
        }, 500);

      } catch (err) {
        errorMsg.innerText = "에러: " + err.message + " (새로고침을 해주세요)";
      }
    }
    init();
  </script>
</body>
</html>
